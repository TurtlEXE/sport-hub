spring.application.name=mock_project

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# TODO: Mẫu cấu hình chung. Hãy cấu hình password thực tế tại file application-local.properties.
# Ứng dụng sẽ tự động ưu tiên load file application-local.properties khi chạy local.
spring.profiles.active=local
spring.datasource.url=jdbc:mysql://localhost:3306/court_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
# Update dialect for Hibernate 6/7 compatibility (MySQL8Dialect is removed)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SECURITY / JWT CONFIGURATION
# ===============================
app.jwtSecret=your_jwt_secret_key_needs_to_be_long_and_secure_for_production_min_256_bits_for_hs256
app.jwtExpirationMs=86400000

# ===============================
# APP SPECIFIC CONFIGURATION
# ===============================
# Expiration times in minutes
app.otp.verify-email.expiration-minutes=1440
app.otp.reset-password.expiration-minutes=10

# ===============================
# EMAIL SMTP CONFIGURATION (Gmail)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# OAUTH2 CONFIGURATION
# ===============================
spring.security.oauth2.client.registration.google.client-id=your-google-client-id
spring.security.oauth2.client.registration.google.client-secret=your-google-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.facebook.client-id=your-facebook-client-id
spring.security.oauth2.client.registration.facebook.client-secret=your-facebook-client-secret
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
