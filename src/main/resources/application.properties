spring.application.name=mock_project

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# TODO: Please update the username and password to match your local MySQL account
spring.datasource.url=jdbc:mysql://localhost:3306/court_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
# Update dialect for Hibernate 6/7 compatibility (MySQL8Dialect is removed)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SECURITY / JWT CONFIGURATION
# ===============================
# app.jwtSecret=your_jwt_secret_key_needs_to_be_long_and_secure_for_production
# app.jwtExpirationMs=86400000
