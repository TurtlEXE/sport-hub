<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">SportHub Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800;900&family=Noto+Sans+Myanmar:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dash-bg': '#f4f6fa',
                        'dash-sidebar': '#1c1f3d',
                        'primary-blue': '#2563EB',
                        'primary-pink': '#f43f5e',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'Inter', 'system-ui', 'sans-serif'],
                        vi: ['Inter', 'system-ui', 'sans-serif'],
                        my: ['"Noto Sans Myanmar"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body th:class="${#locale.language == 'vi' ? 'bg-dash-bg text-slate-900 font-vi antialiased h-screen overflow-hidden flex' : (#locale.language == 'my' ? 'bg-dash-bg text-slate-900 font-my antialiased h-screen overflow-hidden flex' : 'bg-dash-bg text-slate-900 font-sans antialiased h-screen overflow-hidden flex')}">

    <!-- Sidebar -->
    <aside class="w-64 bg-dash-sidebar flex-shrink-0 flex flex-col justify-between text-white shadow-xl z-20">
        <div>
            <!-- Logo -->
            <div class="h-20 flex items-center px-6 border-b border-white/10 cursor-pointer" onclick="window.location.href='/'">
                <div class="w-8 h-8 bg-primary-blue rounded-lg flex items-center justify-center mr-3 shadow-lg shadow-blue-500/20">
                    <span class="text-white font-black text-lg tracking-tighter">S</span>
                </div>
                <span class="font-black text-xl tracking-tight text-white uppercase">Sport<span class="text-blue-400">Hub</span></span>
            </div>
            
            <!-- Dynamic Navigation injected from page -->
            <div layout:fragment="sidebar-menu" class="py-6 px-4 space-y-2">
                <!-- Fallback menu -->
            </div>
        </div>
        
        <!-- Bottom Sidebar Options -->
        <div class="p-4 space-y-3 mb-4">
            <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-300 hover:text-white bg-white/5 hover:bg-white/10 transition-colors w-full text-center justify-center">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Client Explorer
            </a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-rose-200 hover:text-white bg-rose-500/10 hover:bg-rose-500/20 transition-colors w-full text-center justify-center border border-rose-500/20">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Exit Console
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- Top Navbar -->
        <header class="h-20 bg-white shadow-sm flex items-center justify-between px-8 z-10">
            <!-- Greeting & Subtitle (Injected via fragment) -->
            <div layout:fragment="header-title" class="flex-1">
                <h1 class="text-xl font-bold text-slate-900">Hello, User</h1>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">CONSOLE ACCESS GRANTED</p>
            </div>
            
            <!-- Search & Actions -->
            <div class="flex items-center gap-6">
                <!-- Search bar -->
                <div class="relative hidden md:block">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" placeholder="Search Anything.." class="w-64 pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-full focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary-blue/20 focus:border-primary-blue transition-colors text-sm">
                </div>
                
                <!-- Notification -->
                <button class="relative p-2 text-slate-400 hover:text-primary-blue transition-colors">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full border border-white"></span>
                </button>
                
                <!-- Profile -->
                <div class="flex items-center gap-3 pl-6 border-l border-slate-200">
                    <div class="w-9 h-9 bg-blue-100 text-primary-blue rounded-full flex items-center justify-center font-bold text-sm">
                        <span th:text="${#strings.substring(#authentication.principal.account.fullName, 0, 1)}" class="uppercase">U</span>
                    </div>
                    <div class="hidden lg:block">
                        <div th:text="${#authentication.principal.account.fullName}" class="text-sm font-bold text-slate-900 leading-none mb-1">User Name</div>
                        <div th:text="${#authentication.principal.account.role}" class="text-xs font-bold text-primary-blue uppercase tracking-wider leading-none">ROLE</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Scrollable Area -->
        <main class="flex-1 overflow-y-auto p-8 relative pb-24">
            <div layout:fragment="content">
                <!-- Page specific content goes here -->
            </div>
        </main>
        
        <!-- Bottom Banner -->
        <div class="absolute bottom-0 left-0 right-0 h-16 bg-dash-sidebar flex flex-col items-center justify-center text-center px-4 z-10 border-t border-white/5">
            <h3 class="text-white text-xs font-bold tracking-widest uppercase mb-1">SPORTHUB MASTER ADMINISTRATION DESK</h3>
            <p class="text-slate-400 text-[10px] uppercase tracking-wide">Secure console with global record overrides, commission syncs, and database level locks.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/main.js}"></script>
    <th:block layout:fragment="pageScripts"></th:block>

</body>
</html>
