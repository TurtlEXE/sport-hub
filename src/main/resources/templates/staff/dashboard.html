<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{dashboard-layout}">

<head>
    <title>Staff Dashboard</title>
</head>

<body>
    <!-- Sidebar Menu -->
    <div layout:fragment="sidebar-menu" class="py-6 px-4 space-y-2">
        <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 px-4">OPERATIONS</div>
        
        <a href="/staff/dashboard" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-400 shadow-lg shadow-emerald-500/30">
            <svg class="w-5 h-5 opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
            Daily Schedule
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-colors">
            <svg class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            Customer Check-in
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-white/5 transition-colors">
            <svg class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            Issue Reporting
        </a>
    </div>

    <!-- Header Title -->
    <div layout:fragment="header-title" class="flex-1">
        <h1 class="text-xl font-bold text-slate-900">Hello, Staff Member</h1>
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">STAFF DESK • FACILITY OPERATIONS</p>
    </div>

    <!-- Main Content -->
    <div layout:fragment="content">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Check-in section -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col items-center justify-center h-64 text-slate-400 border-dashed border-2">
                    <p class="font-semibold">Scanner / Check-in Placeholder</p>
                </div>
            </div>

            <!-- Right Column -->
            <div class="space-y-6">
                <!-- Tasks Card -->
                <div class="rounded-2xl shadow-lg p-6 bg-gradient-to-br from-slate-700 to-slate-900 text-white">
                    <h3 class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-4">TODAY'S SHIFT</h3>
                    <ul class="space-y-3 text-sm">
                        <li class="flex items-center gap-2"><input type="checkbox" checked class="rounded bg-slate-800 border-slate-600 text-emerald-500"> Open facility</li>
                        <li class="flex items-center gap-2"><input type="checkbox" class="rounded bg-slate-800 border-slate-600 text-emerald-500"> Verify bookings</li>
                        <li class="flex items-center gap-2"><input type="checkbox" class="rounded bg-slate-800 border-slate-600 text-emerald-500"> Close facility</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
