<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{auth-layout}">
<head>
    <title>Set New Password - SportHub</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 relative">
            
            <a href="/" class="absolute top-6 right-6 z-50 text-sm font-semibold text-slate-500 hover:text-primary-blue flex items-center gap-2 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span th:text="#{auth.back}">Back to Home</span>
            </a>
            <div class="max-w-md w-full space-y-8 bg-white p-8 sm:p-10 rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/50">
                <div class="text-center">
                    <div class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-black text-slate-900">Set New Password</h2>
                    <p class="mt-2 text-sm text-slate-500">
                        Your new password must be different to previously used passwords.
                    </p>
                </div>

                <!-- Custom Alert Box -->
                <div class="auth-alert hidden p-4 rounded-xl border flex gap-3 items-start text-sm">
                    <span class="alert-icon shrink-0 mt-0.5"></span>
                    <span class="alert-msg font-medium"></span>
                </div>

                <!-- Step 1: Verify OTP Form -->
                <form id="verifyOtpForm" class="mt-8 space-y-5">
                    <input type="hidden" name="email" th:value="${email}">
                    
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">OTP Code</label>
                        <input type="text" id="otpInput" name="otp" required maxlength="6" placeholder="000000" class="w-full text-center tracking-[0.5em] font-mono px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary-blue/20 focus:border-primary-blue transition-colors">
                    </div>

                    <button type="submit" class="w-full bg-slate-900 hover:bg-primary-blue text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-slate-900/10 flex items-center justify-center">
                        Verify OTP
                    </button>
                </form>

                <!-- Step 2: Reset Password Form -->
                <form id="resetPasswordForm" class="mt-8 space-y-5 hidden">
                    <input type="hidden" name="email" th:value="${email}">
                    <input type="hidden" name="otp" id="hiddenOtp">
                    
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5"><span th:text="#{auth.reset.new_password}">New Password</span></label>
                        <div class="relative">
                            <input type="password" id="newPassword" name="newPassword" required placeholder="••••••••" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary-blue/20 focus:border-primary-blue transition-colors">
                            <button type="button" class="toggle-password absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none" data-target="newPassword">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5"><span th:text="#{auth.reg.confirm_password}">Confirm Password</span></label>
                        <input type="password" name="confirmPassword" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary-blue/20 focus:border-primary-blue transition-colors">
                    </div>

                    <button type="submit" class="w-full bg-slate-900 hover:bg-primary-blue text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-slate-900/10 flex items-center justify-center">
                        Reset Password
                    </button>
                </form>
            </div>
        </div>
    </main>

    <th:block layout:fragment="pageScripts">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const verifyForm = document.getElementById('verifyOtpForm');
                const resetForm = document.getElementById('resetPasswordForm');
                const otpInput = document.getElementById('otpInput');
                const hiddenOtp = document.getElementById('hiddenOtp');

                handleAuthFormSubmit(verifyForm, '/api/auth/verify-reset-otp', (result) => {
                    // Success, hide verify form and show reset form
                    verifyForm.classList.add('hidden');
                    resetForm.classList.remove('hidden');
                    // Transfer the OTP value
                    hiddenOtp.value = otpInput.value;
                    
                    // Clear the alert box
                    const alertBox = resetForm.parentElement.querySelector('.auth-alert');
                    if (alertBox) alertBox.classList.add('hidden');
                });

                handleAuthFormSubmit(resetForm, '/api/auth/reset-password', (result) => {
                    window.location.href = '/auth/login?reset=true';
                });
            });
        </script>
    </th:block>
</body>
</html>
