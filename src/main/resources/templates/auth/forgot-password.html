<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{auth-layout}">
<head>
    <title>Forgot Password - SportHub</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="min-h-screen flex items-center justify-center relative overflow-hidden">
            <!-- Background Image -->
            <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1579952363873-27f3bade9f55?auto=format&fit=crop&w=1920&q=80');"></div>
            <!-- Overlay -->
            <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px]"></div>

            <a href="/" class="absolute top-6 right-6 z-50 text-sm font-semibold text-white/70 hover:text-white flex items-center gap-2 transition-colors bg-white/10 px-4 py-2 rounded-full backdrop-blur-md border border-white/20">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back to Home
            </a>

            <!-- Form Card -->
            <div class="relative z-10 max-w-md w-full mx-4 space-y-8 glass-panel p-8 sm:p-10 rounded-3xl shadow-2xl">
                <div class="text-center">
                    <div class="w-16 h-16 bg-white/50 text-primary-blue rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm border border-white/40">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-black text-slate-900">Forgot Password?</h2>
                    <p class="mt-3 text-[15px] font-medium text-slate-600">
                        No worries, we'll send you reset instructions.
                    </p>
                </div>

                <!-- Custom Alert Box -->
                <div class="auth-alert hidden p-4 rounded-xl border flex gap-3 items-start text-sm bg-white/80 backdrop-blur-sm">
                    <span class="alert-icon shrink-0 mt-0.5"></span>
                    <span class="alert-msg font-medium"></span>
                </div>

                <form id="forgotForm" class="mt-8 space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-800 mb-2">Email Address</label>
                        <input type="email" name="email" required placeholder="Enter the email associated with your account" class="w-full px-4 py-3.5 bg-white/60 border border-white/50 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary-blue focus:border-transparent transition-all font-medium text-slate-900 shadow-inner">
                    </div>

                    <button type="submit" class="w-full bg-primary-blue hover:bg-blue-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/30 flex items-center justify-center hover:-translate-y-0.5">
                        Send OTP Code
                    </button>
                </form>

                <div class="text-center mt-6">
                    <a th:href="@{/auth/login}" class="text-sm font-bold text-slate-700 hover:text-primary-blue flex items-center justify-center gap-2 transition-colors">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        Back to log in
                    </a>
                </div>
            </div>
        </div>
    </main>

    <th:block layout:fragment="pageScripts">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const form = document.getElementById('forgotForm');
                handleAuthFormSubmit(form, '/api/auth/forgot-password', (result, data) => {
                    window.location.href = `/auth/reset-password?email=${encodeURIComponent(data.email)}`;
                });
            });
        </script>
    </th:block>
</body>
</html>
