<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{auth-layout}">
<head>
    <title>Complete Profile - SportHub</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 relative">
            
            <a href="/" class="absolute top-6 right-6 z-50 text-sm font-semibold text-slate-500 hover:text-primary-blue flex items-center gap-2 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back to Home
            </a>
            <div class="max-w-md w-full space-y-8 bg-white p-8 sm:p-10 rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/50">
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-50 text-primary-blue rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-black text-slate-900">Complete Profile</h2>
                    <p class="mt-2 text-sm text-slate-500">
                        Just one more step! We need your phone number for booking confirmations.
                    </p>
                </div>

                <!-- Custom Alert Box -->
                <div class="auth-alert hidden p-4 rounded-xl border flex gap-3 items-start text-sm">
                    <span class="alert-icon shrink-0 mt-0.5"></span>
                    <span class="alert-msg font-medium"></span>
                </div>

                <form id="completeForm" class="mt-8 space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Phone Number</label>
                        <input type="tel" name="phone" required placeholder="Enter your phone number" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary-blue/20 focus:border-primary-blue transition-colors">
                    </div>

                    <button type="submit" class="w-full bg-slate-900 hover:bg-primary-blue text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-slate-900/10 flex items-center justify-center">
                        Complete Registration
                    </button>
                </form>
            </div>
        </div>
    </main>

    <th:block layout:fragment="pageScripts">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const form = document.getElementById('completeForm');
                handleAuthFormSubmit(form, '/api/auth/complete-profile', (result) => {
                    window.location.href = '/';
                });
            });
        </script>
    </th:block>
</body>
</html>
