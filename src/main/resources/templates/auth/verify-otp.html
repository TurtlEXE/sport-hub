<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{auth-layout}">
<head>
    <title>Verify Email - SportHub</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="min-h-screen flex flex-col md:flex-row bg-white relative">
            
            <a href="/" class="absolute top-6 right-6 z-50 text-sm font-semibold text-slate-500 hover:text-primary-blue flex items-center gap-2 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back to Home
            </a>
            
            <div class="hidden md:flex md:w-1/2 bg-slate-950 relative overflow-hidden items-center justify-center p-12 lg:p-20">
                <div class="absolute inset-0 bg-gradient-to-tr from-primary-blue/20 to-transparent"></div>
                <div class="relative z-10 w-full max-w-md text-center">
                    <div class="w-20 h-20 bg-primary-blue/20 rounded-full flex items-center justify-center mx-auto mb-8 animate-pulse">
                        <svg class="w-10 h-10 text-primary-blue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l7-4.666a2 2 0 012.22 0l7 4.666A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76"/>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-black text-white leading-tight mb-4">Check Your Inbox</h2>
                    <p class="text-slate-400 text-lg leading-relaxed">
                        We've sent a 6-digit verification code to your email. Enter it to activate your account.
                    </p>
                </div>
            </div>

            <div class="w-full md:w-1/2 flex items-center justify-center p-6 sm:p-12 lg:p-20">
                <div class="w-full max-w-md animate-fade-in text-center md:text-left">
                    
                    <h1 class="text-3xl font-black text-slate-900 mb-2">Verify Email</h1>
                    <p class="text-slate-500 mb-8">
                        Sent to: <span class="font-bold text-slate-700" th:text="${email}">user@example.com</span>
                    </p>

                    <!-- Custom Alert Box -->
                    <div class="auth-alert hidden mb-6 p-4 rounded-xl border flex gap-3 items-start text-sm text-left">
                        <span class="alert-icon shrink-0 mt-0.5"></span>
                        <span class="alert-msg font-medium"></span>
                    </div>

                    <form id="verifyForm" class="space-y-6 text-left">
                        <input type="hidden" name="email" th:value="${email}">
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-3">Verification Code</label>
                            <input type="text" name="otp" required maxlength="6" placeholder="000000" class="w-full text-center text-3xl tracking-[1em] font-mono px-4 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary-blue/20 focus:border-primary-blue transition-colors">
                        </div>

                        <button type="submit" class="w-full bg-slate-900 hover:bg-primary-blue text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-slate-900/10 flex items-center justify-center">
                            Verify Account
                        </button>
                    </form>

                    <p class="mt-8 text-center text-sm text-slate-600">
                        Didn't receive the code? <button class="font-bold text-primary-blue hover:underline">Resend OTP</button>
                    </p>
                </div>
            </div>
            
        </div>
    </main>

    <th:block layout:fragment="pageScripts">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const form = document.getElementById('verifyForm');
                handleAuthFormSubmit(form, '/api/auth/verify', (result) => {
                    // Success verification
                    window.location.href = '/auth/login?verified=true';
                });
            });
        </script>
    </th:block>
</body>
</html>
