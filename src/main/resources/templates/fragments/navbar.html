<!-- Navbar Fragment -->
<nav th:fragment="navbar" class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
                <div class="w-10 h-10 bg-primary-blue rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="text-white font-black text-xl tracking-tighter">S</span>
                </div>
                <span class="font-black text-2xl tracking-tight text-slate-900">Sport<span class="text-primary-blue">Hub</span></span>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="/#" class="text-sm font-semibold text-primary-blue transition-colors" th:text="#{nav.home}">Home</a>
                <a href="/#venues" class="text-sm font-semibold text-slate-600 hover:text-primary-blue transition-colors" th:text="#{nav.venues}">Venues</a>
                <a href="/#how-it-works" class="text-sm font-semibold text-slate-600 hover:text-primary-blue transition-colors" th:text="#{nav.how_it_works}">How it works</a>
                <a href="/#about" class="text-sm font-semibold text-slate-600 hover:text-primary-blue transition-colors" th:text="#{nav.about}">About</a>
                <a href="/#contact" class="text-sm font-semibold text-slate-600 hover:text-primary-blue transition-colors" th:text="#{nav.contact}">Contact</a>
            </div>

            <!-- Desktop Actions -->
            <div class="hidden md:flex items-center space-x-4">
                <!-- Language Switcher Dropdown -->
                <div class="relative group">
                    <button class="flex items-center gap-1 p-2 rounded-lg hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-200">
                        <span class="text-xl leading-none block mt-0.5" th:text="${#locale.language == 'vi' ? '🇻🇳' : (#locale.language == 'my' ? '🇲🇲' : '🇺🇸')}">🇺🇸</span>
                        <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <!-- Dropdown menu -->
                    <div class="absolute right-0 mt-1 w-36 bg-white rounded-xl shadow-lg shadow-slate-200/50 border border-slate-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 transform origin-top-right z-50">
                        <div class="py-1">
                            <button onclick="changeLanguage('en')" class="block w-full text-left px-4 py-2.5 text-sm font-semibold transition-colors" th:classappend="${#locale.language == 'en' ? 'text-primary-blue bg-blue-50/50' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}">English</button>
                            <button onclick="changeLanguage('vi')" class="block w-full text-left px-4 py-2.5 text-sm font-semibold transition-colors" th:classappend="${#locale.language == 'vi' ? 'text-primary-blue bg-blue-50/50' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}">Vietnamese</button>
                            <button onclick="changeLanguage('my')" class="block w-full text-left px-4 py-2.5 text-sm font-semibold transition-colors" th:classappend="${#locale.language == 'my' ? 'text-primary-blue bg-blue-50/50' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}">Myanmar</button>
                        </div>
                    </div>
                </div>
                
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/auth/login}" class="text-sm font-semibold text-slate-700 hover:text-primary-blue px-4 py-2 transition-colors" th:text="#{nav.login}">Log in</a>
                    <a th:href="@{/auth/register}" class="bg-slate-900 hover:bg-primary-blue text-white text-sm font-semibold px-6 py-2.5 rounded-full transition-all shadow-md shadow-slate-900/10 hover:shadow-primary-blue/25 hover:-translate-y-0.5" th:text="#{nav.signup}">
                        Sign up
                    </a>
                </div>
                
                <div sec:authorize="isAuthenticated()" class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <img th:if="${#authentication.principal.account.avatarPath != null && !#authentication.principal.account.avatarPath.isEmpty()}" 
                             th:src="${#authentication.principal.account.avatarPath}" 
                             alt="Avatar" 
                             class="w-8 h-8 rounded-full object-cover border border-slate-200">
                        <div th:unless="${#authentication.principal.account.avatarPath != null && !#authentication.principal.account.avatarPath.isEmpty()}" 
                             class="w-8 h-8 bg-blue-100 text-primary-blue rounded-full flex items-center justify-center font-bold">
                            <span th:text="${#strings.substring(#authentication.principal.account.fullName, 0, 1)}" class="uppercase text-xs">U</span>
                        </div>
                        <span th:text="${#authentication.principal.account.fullName}" class="text-sm font-semibold text-slate-700 truncate max-w-[150px]">User</span>
                    </div>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" class="text-sm font-semibold text-rose-500 hover:text-rose-600 px-3 py-2 border border-rose-100 rounded-lg hover:bg-rose-50 transition-colors" th:text="#{nav.logout}">
                            Logout
                        </button>
                    </form>
                </div>
            </div>

            <!-- Mobile menu button -->
            <div class="md:hidden flex items-center">
                <button id="mobile-menu-toggle-btn" class="text-slate-600 hover:text-slate-900 focus:outline-none p-2">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu Panel -->
    <div id="mobile-menu-panel" class="md:hidden hidden bg-white border-b border-slate-200">
        <div class="px-4 pt-2 pb-6 space-y-1">
            <a href="/#" class="block px-3 py-2 text-base font-semibold text-primary-blue bg-blue-50 rounded-lg" th:text="#{nav.home}">Home</a>
            <a href="/#venues" class="block px-3 py-2 text-base font-semibold text-slate-700 hover:bg-slate-50 hover:text-primary-blue rounded-lg" th:text="#{nav.venues}">Venues</a>
            <a href="/#how-it-works" class="block px-3 py-2 text-base font-semibold text-slate-700 hover:bg-slate-50 hover:text-primary-blue rounded-lg" th:text="#{nav.how_it_works}">How it works</a>
            <a href="/#about" class="block px-3 py-2 text-base font-semibold text-slate-700 hover:bg-slate-50 hover:text-primary-blue rounded-lg" th:text="#{nav.about}">About</a>
            <a href="/#contact" class="block px-3 py-2 text-base font-semibold text-slate-700 hover:bg-slate-50 hover:text-primary-blue rounded-lg" th:text="#{nav.contact}">Contact</a>
            
            <div sec:authorize="!isAuthenticated()" class="pt-4 mt-4 border-t border-slate-100 grid grid-cols-2 gap-4">
                <a th:href="@{/auth/login}" class="text-center px-4 py-2 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700" th:text="#{nav.login}">Log in</a>
                <a th:href="@{/auth/register}" class="text-center px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-semibold" th:text="#{nav.signup}">Sign up</a>
            </div>
            
            <div sec:authorize="isAuthenticated()" class="pt-4 mt-4 border-t border-slate-100">
                <div class="flex items-center gap-3 mb-4 px-3">
                    <img th:if="${#authentication.principal.account.avatarPath != null && !#authentication.principal.account.avatarPath.isEmpty()}" 
                         th:src="${#authentication.principal.account.avatarPath}" 
                         alt="Avatar" 
                         class="w-10 h-10 rounded-full object-cover border border-slate-200">
                    <div th:unless="${#authentication.principal.account.avatarPath != null && !#authentication.principal.account.avatarPath.isEmpty()}" 
                         class="w-10 h-10 bg-blue-100 text-primary-blue rounded-full flex items-center justify-center font-bold">
                        <span th:text="${#strings.substring(#authentication.principal.account.fullName, 0, 1)}" class="uppercase text-sm">U</span>
                    </div>
                    <div>
                        <div th:text="${#authentication.principal.account.fullName}" class="text-sm font-bold text-slate-900">User</div>
                        <div class="text-xs text-slate-500">Logged in</div>
                    </div>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="w-full text-center px-4 py-2 bg-rose-50 text-rose-600 rounded-xl text-sm font-semibold" th:text="#{nav.logout}">
                        Logout
                    </button>
                </form>
            </div>
            
            <!-- Mobile Language Switcher -->
            <div class="pt-4 mt-4 border-t border-slate-100 flex justify-center gap-2 flex-wrap">
                <button onclick="changeLanguage('en')" class="flex-1 px-4 py-2 text-sm font-bold rounded-lg border transition-colors whitespace-nowrap" th:classappend="${#locale.language == 'en' ? 'bg-primary-blue text-white border-primary-blue shadow-sm' : 'bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100'}">English</button>
                <button onclick="changeLanguage('vi')" class="flex-1 px-4 py-2 text-sm font-bold rounded-lg border transition-colors whitespace-nowrap" th:classappend="${#locale.language == 'vi' ? 'bg-primary-blue text-white border-primary-blue shadow-sm' : 'bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100'}">Tiếng Việt</button>
                <button onclick="changeLanguage('my')" class="flex-1 px-4 py-2 text-sm font-bold rounded-lg border transition-colors whitespace-nowrap" th:classappend="${#locale.language == 'my' ? 'bg-primary-blue text-white border-primary-blue shadow-sm' : 'bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100'}">Myanmar</button>
            </div>
        </div>
    </div>
    
    <script>
        function changeLanguage(lang) {
            const url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            window.location.href = url.toString();
        }
    </script>
</nav>
