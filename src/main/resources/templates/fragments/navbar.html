<!-- Navbar Fragment -->
<nav th:fragment="navbar" class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="window.location.href='/'">
                <div class="w-10 h-10 bg-primary-blue rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="text-white font-black text-xl tracking-tighter">S</span>
                </div>
                <span class="font-black text-2xl tracking-tight text-slate-900">Sport<span class="text-primary-blue">Hub</span></span>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="/#" class="text-sm font-semibold text-primary-blue transition-colors">Home</a>
                <a href="/#venues" class="text-sm font-semibold text-slate-600 hover:text-primary-blue transition-colors">Venues</a>
                <a href="/#how-it-works" class="text-sm font-semibold text-slate-600 hover:text-primary-blue transition-colors">How it works</a>
                <a href="/#about" class="text-sm font-semibold text-slate-600 hover:text-primary-blue transition-colors">About</a>
                <a href="/#contact" class="text-sm font-semibold text-slate-600 hover:text-primary-blue transition-colors">Contact</a>
            </div>

            <!-- Desktop Actions -->
            <div class="hidden md:flex items-center space-x-4">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/auth/login}" class="text-sm font-semibold text-slate-700 hover:text-primary-blue px-4 py-2 transition-colors">Log in</a>
                    <a th:href="@{/auth/register}" class="bg-slate-900 hover:bg-primary-blue text-white text-sm font-semibold px-6 py-2.5 rounded-full transition-all shadow-md shadow-slate-900/10 hover:shadow-primary-blue/25 hover:-translate-y-0.5">
                        Sign up
                    </a>
                </div>
                
                <div sec:authorize="isAuthenticated()" class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <img th:if="${#authentication.principal.account.avatarPath != null && !#authentication.principal.account.avatarPath.isEmpty()}" 
                             th:src="${#authentication.principal.account.avatarPath}" 
                             alt="Avatar" 
                             class="w-8 h-8 rounded-full object-cover border border-slate-200">
                        <div th:unless="${#authentication.principal.account.avatarPath != null && !#authentication.principal.account.avatarPath.isEmpty()}" 
                             class="w-8 h-8 bg-blue-100 text-primary-blue rounded-full flex items-center justify-center font-bold">
                            <span th:text="${#strings.substring(#authentication.principal.account.fullName, 0, 1)}" class="uppercase text-xs">U</span>
                        </div>
                        <span th:text="${#authentication.principal.account.fullName}" class="text-sm font-semibold text-slate-700 truncate max-w-[150px]">User</span>
                    </div>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" class="text-sm font-semibold text-rose-500 hover:text-rose-600 px-3 py-2 border border-rose-100 rounded-lg hover:bg-rose-50 transition-colors">
                            Logout
                        </button>
                    </form>
                </div>
            </div>

            <!-- Mobile menu button -->
            <div class="md:hidden flex items-center">
                <button id="mobile-menu-toggle-btn" class="text-slate-600 hover:text-slate-900 focus:outline-none p-2">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu Panel -->
    <div id="mobile-menu-panel" class="md:hidden hidden bg-white border-b border-slate-200">
        <div class="px-4 pt-2 pb-6 space-y-1">
            <a href="/#" class="block px-3 py-2 text-base font-semibold text-primary-blue bg-blue-50 rounded-lg">Home</a>
            <a href="/#venues" class="block px-3 py-2 text-base font-semibold text-slate-700 hover:bg-slate-50 hover:text-primary-blue rounded-lg">Venues</a>
            <a href="/#how-it-works" class="block px-3 py-2 text-base font-semibold text-slate-700 hover:bg-slate-50 hover:text-primary-blue rounded-lg">How it works</a>
            <a href="/#about" class="block px-3 py-2 text-base font-semibold text-slate-700 hover:bg-slate-50 hover:text-primary-blue rounded-lg">About</a>
            <a href="/#contact" class="block px-3 py-2 text-base font-semibold text-slate-700 hover:bg-slate-50 hover:text-primary-blue rounded-lg">Contact</a>
            
            <div sec:authorize="!isAuthenticated()" class="pt-4 mt-4 border-t border-slate-100 grid grid-cols-2 gap-4">
                <a th:href="@{/auth/login}" class="text-center px-4 py-2 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700">Log in</a>
                <a th:href="@{/auth/register}" class="text-center px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-semibold">Sign up</a>
            </div>
            
            <div sec:authorize="isAuthenticated()" class="pt-4 mt-4 border-t border-slate-100">
                <div class="flex items-center gap-3 mb-4 px-3">
                    <img th:if="${#authentication.principal.account.avatarPath != null && !#authentication.principal.account.avatarPath.isEmpty()}" 
                         th:src="${#authentication.principal.account.avatarPath}" 
                         alt="Avatar" 
                         class="w-10 h-10 rounded-full object-cover border border-slate-200">
                    <div th:unless="${#authentication.principal.account.avatarPath != null && !#authentication.principal.account.avatarPath.isEmpty()}" 
                         class="w-10 h-10 bg-blue-100 text-primary-blue rounded-full flex items-center justify-center font-bold">
                        <span th:text="${#strings.substring(#authentication.principal.account.fullName, 0, 1)}" class="uppercase text-sm">U</span>
                    </div>
                    <div>
                        <div th:text="${#authentication.principal.account.fullName}" class="text-sm font-bold text-slate-900">User</div>
                        <div class="text-xs text-slate-500">Logged in</div>
                    </div>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="w-full text-center px-4 py-2 bg-rose-50 text-rose-600 rounded-xl text-sm font-semibold">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
