home.about.desc1=၂၀၂၆ ခုနှစ်တွင် တည်ထောင်ခဲ့သော SportHub သည် ကစားသမားများအတွက် အဆင့်မြင့် အားကစားကွင်းအချိန်များကို အလွယ်တကူ မှာယူနိုင်စေရန်နှင့် ကွင်းမန်နေဂျာများအတွက် ကြိုတင်မှာယူမှုများကို လွယ်ကူစွာ စီမံခန့်ခွဲနိုင်ရန် ဖန်တီးထားသော ထိပ်တန်း အားကစားပလက်ဖောင်းတစ်ခု ဖြစ်ပါသည်။
home.about.desc2=ကျွန်ုပ်တို့၏ ပလက်ဖောင်းသည် ကြိုတင်မှာယူမှုလုပ်ငန်းစဉ်များကို အလိုအလျောက်ဆောင်ရွက်ပေးပြီး ငွေပေးချေမှုအချိန်ဇယားများကို စီမံခန့်ခွဲပေးပါသည်။ ကျွန်ုပ်တို့အတူတကွ ပိုမိုကျန်းမာတက်ကြွသော ကမ္ဘာကြီးကို တည်ဆောက်နေပါသည်။
